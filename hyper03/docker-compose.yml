# Gemma 4 31B NVFP4 and Qwen3.6-27B NVFP4 on hyper03
#
# Default layout (override with GLM45_AIR_MODELS_DIR=/your/path docker compose up -d):
#   /storage03/models/gemma4-31b/Gemma-4-31B-IT-NVFP4/
#   /storage03/models/qwen36-27b/qwen3.6-27b-nvfp4/   <- optional local unsloth/Qwen3.6-27B-NVFP4 mirror
#   /storage03/huggingface/                            <- Hugging Face cache
#
# Upstream serving notes:
#   - The default image below tracks the vLLM Gemma4 CUDA 13.0 image for
#     Blackwell.
#   - hyper03 targets one NVIDIA RTX PRO 6000 Blackwell card with 96 GB GDDR7.
#   - RTX PRO 6000 Blackwell has 5th-gen Tensor Cores with FP4 support. NVFP4 is
#     selected for Gemma 4 31B to use the native low-precision path and fit
#     alongside the Qwen service.
#   - Gemma is capped at 65K context and one active sequence by default. The
#     default GPU memory target is intentionally below the whole-card setting but
#     still high enough to load the NVFP4 checkpoint plus a useful KV cache.
#   - Qwen3.6-27B supports a native 262K context window, but the default here is
#     capped at 65K and 4 active sequences to favor decode speed over maximum
#     synthetic context capacity.

services:
  gemma:
    image: ${GEMMA4_VLLM_IMAGE:-vllm/vllm-openai:gemma4-0505-cu130}
    container_name: vllm-gemma4-31b-nvfp4
    restart: unless-stopped
    profiles:
      - gemma
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - VLLM_FLASHINFER_MOE_BACKEND=throughput
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${GEMMA4_31B_MODELS_DIR:-/storage03/models/gemma4-31b}/Gemma-4-31B-IT-NVFP4:/models/gemma-4-31b-nvfp4
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
    command:
      - ${GEMMA4_31B_MODEL_PATH:-/models/gemma-4-31b-nvfp4}
      - --served-model-name
      - gemma-4-31b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${GEMMA4_31B_TP_SIZE:-1}
      - --dtype
      - auto
      - --kv-cache-dtype
      - ${GEMMA4_31B_KV_CACHE_DTYPE:-fp8}
      - --max-model-len
      - ${GEMMA4_31B_MAX_MODEL_LEN:-65536}
      - --max-num-seqs
      - ${GEMMA4_31B_MAX_NUM_SEQS:-1}
      - --max-num-batched-tokens
      - ${GEMMA4_31B_MAX_BATCHED_TOKENS:-65536}
      - --gpu-memory-utilization
      - ${GEMMA4_31B_GPU_MEMORY_UTILIZATION:-0.40}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - ${GEMMA4_31B_LOAD_FORMAT:-auto}
      - --trust-remote-code
      - --async-scheduling
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --limit-mm-per-prompt
      - '{"image":0,"video":0,"audio":0}'
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qwen:
    image: ${VLLM_IMAGE:-vllm/vllm-openai@sha256:d0f160a7391f574fdffdd0f8da13eea09c590b3b9651a2dba30b1d358ff942bb}
    container_name: vllm-qwen36-27b-nvfp4
    restart: unless-stopped
    profiles:
      - qwen
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${QWEN36_27B_MODELS_DIR:-/storage03/models/qwen36-27b}/qwen3.6-27b-nvfp4:/models/qwen3.6-27b-nvfp4
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
    command:
      - ${QWEN36_27B_MODEL_PATH:-/models/qwen3.6-27b-nvfp4}
      - --served-model-name
      - qwen3.6-27b
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --tensor-parallel-size
      - ${QWEN36_27B_TP_SIZE:-1}
      - --dtype
      - auto
      - --kv-cache-dtype
      - ${QWEN36_27B_KV_CACHE_DTYPE:-fp8}
      - --max-model-len
      - ${QWEN36_27B_MAX_MODEL_LEN:-65536}
      - --max-num-seqs
      - ${QWEN36_27B_MAX_NUM_SEQS:-4}
      - --max-num-batched-tokens
      - ${QWEN36_27B_MAX_BATCHED_TOKENS:-65536}
      - --gpu-memory-utilization
      - ${QWEN36_27B_GPU_MEMORY_UTILIZATION:-0.55}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - ${QWEN36_27B_LOAD_FORMAT:-auto}
      - --trust-remote-code
      - --async-scheduling
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${QWEN36_27B_TOOL_CALL_PARSER:-qwen3_xml}
      - --reasoning-parser
      - qwen3
      - --speculative-config.method
      - mtp
      - --speculative-config.num_speculative_tokens
      - ${QWEN36_27B_SPECULATIVE_TOKENS:-3}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
