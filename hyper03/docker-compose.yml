# Production hybrid deployment for hyper03.
#
# Host:
#   NVIDIA RTX PRO 6000 Blackwell Workstation Edition, 96 GB VRAM
#
# Validated layout:
#   /storage03/models/Qwen3.6-27B-int4-AutoRound
#   /storage03/models/gemma4-31b/gguf/gemma-4-31B-it-Q4_K_M.gguf
#
# Validated 2026-06-09:
#   - Qwen/vLLM: 3 concurrent 131k-context sequences
#   - Gemma/llama.cpp: 3 concurrent 131k-context slots
#   - Both resident together: ~86 GB VRAM used, ~11 GB free
#   - 5-wave mixed stress test, 30/30 outputs passed quality checks
#   - Aggregate mixed throughput: ~166 completion tok/s

services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyper03-vllm-qwen36
    ports:
      - "${QWEN36_PORT:-8001}:8000"
    volumes:
      - ${MODELS_ROOT:-/storage03/models}:/models:ro
      - ${VLLM_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/vllm-cache}:/root/.cache/vllm
    environment:
      - PORT=8000
      - MODEL=${QWEN36_MODEL_PATH:-/models/Qwen3.6-27B-int4-AutoRound}
      - MODEL_NAME=${QWEN36_MODEL_NAME:-qwen3.6-27b}
      - MAX_MODEL_LEN=${QWEN36_MAX_MODEL_LEN:-131072}
      - GPU_MEM_UTIL=${QWEN36_GPU_MEM_UTIL:-0.523}
      - MAX_NUM_SEQS=${QWEN36_MAX_NUM_SEQS:-3}
      - NUM_SPEC_TOKENS=${QWEN36_NUM_SPEC_TOKENS:-5}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${CUDA_VISIBLE_DEVICES:-0}"]
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 120
      start_period: 30s
    labels:
      lastloop.service.name: "hyper03-vllm-qwen36"
      lastloop.service.port: "${QWEN36_PORT:-8001}"
      lastloop.service.description: "Qwen3.6 27B AutoRound via patched vLLM, 3x131k, MTP, qwen3_xml tools"

  llama-cpp:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda13-b9445}
    container_name: hyper03-llama-gemma4
    profiles:
      - llama
    depends_on:
      vllm:
        condition: service_healthy
    ports:
      - "${GEMMA4_PORT:-8000}:8080"
    volumes:
      - ${MODELS_ROOT:-/storage03/models}:/models:ro
    command:
      - --model
      - ${GEMMA4_GGUF_MODEL_PATH:-/models/gemma4-31b/gguf/gemma-4-31B-it-Q4_K_M.gguf}
      - --alias
      - ${GEMMA4_MODEL_ALIAS:-gemma-4-31b-q4-llamacpp}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - ${GEMMA4_CTX_SIZE:-393216}
      - --parallel
      - ${GEMMA4_PARALLEL:-3}
      - --n-gpu-layers
      - ${GEMMA4_N_GPU_LAYERS:-999}
      - --flash-attn
      - "on"
      - --cache-type-k
      - ${GEMMA4_CACHE_TYPE_K:-q8_0}
      - --cache-type-v
      - ${GEMMA4_CACHE_TYPE_V:-q8_0}
      - --jinja
      - --reasoning-budget
      - "0"
      - --reasoning
      - "off"
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${CUDA_VISIBLE_DEVICES:-0}"]
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host
    labels:
      lastloop.service.name: "hyper03-llama-gemma4"
      lastloop.service.port: "${GEMMA4_PORT:-8000}"
      lastloop.service.description: "Gemma 4 31B Q4_K_M via llama.cpp, 3x131k slots, q8 KV"
