# GLM-4.5-Air 4-bit/NVFP4 and Qwen3.6-27B NVFP4 on hyper03
#
# Default layout (override with GLM45_AIR_MODELS_DIR=/your/path docker compose up -d):
#   /storage03/models/glm45-air/glm-4.5-air-nvfp4/    <- Firworks/GLM-4.5-Air-nvfp4
#   /storage03/models/qwen36-27b/qwen3.6-27b-nvfp4/   <- optional local unsloth/Qwen3.6-27B-NVFP4 mirror
#   /storage03/huggingface/                            <- Hugging Face cache
#
# Upstream serving notes:
#   - vLLM >= 0.11.0 is required for GLM-4.5-Air support.
#   - The default vLLM image is pinned to the linux/amd64 digest resolved from
#     vllm/vllm-openai:nightly on 2026-06-07 because this NVFP4 checkpoint's
#     model card currently requires nightly vLLM support.
#   - hyper03 targets one NVIDIA RTX PRO 6000 Blackwell card with 96 GB GDDR7.
#   - RTX PRO 6000 Blackwell has 5th-gen Tensor Cores with FP4 support. NVFP4 is
#     selected to fit GLM-4.5-Air into this single-card memory envelope while
#     aligning with the card's native low-precision inference path.
#   - The upstream publisher for GLM-4.5-Air is Z.ai / zai-org. Firworks is used
#     here only as a third-party NVFP4 quantization because an official zai-org
#     NVFP4 checkpoint was not available when this compose file was created.
#   - The BF16 and FP8 GLM-4.5-Air checkpoints are too large for comfortable
#     single-card serving here, so this host defaults to NVFP4 rather than BF16/FP8.
#   - To use an AWQ/GPTQ 4-bit checkpoint instead, set GLM45_AIR_MODEL_PATH to
#     that mounted path or Hugging Face model ID and adjust GLM45_AIR_LOAD_FORMAT
#     only if the checkpoint requires it.
#   - Qwen3.6-27B supports a native 262K context window. The qwen service uses the
#     local unsloth/Qwen3.6-27B-NVFP4 mirror by default and is placed behind the
#     "qwen" profile so a plain `docker compose up -d` does not accidentally
#     start both large models on the same GPU.

services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai@sha256:d0f160a7391f574fdffdd0f8da13eea09c590b3b9651a2dba30b1d358ff942bb}
    container_name: vllm-glm45-air-nvfp4
    restart: unless-stopped
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${GLM45_AIR_MODELS_DIR:-/storage03/models/glm45-air}/glm-4.5-air-nvfp4:/models/glm-4.5-air-nvfp4
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
    command:
      - ${GLM45_AIR_MODEL_PATH:-/models/glm-4.5-air-nvfp4}
      - --served-model-name
      - glm-4.5-air
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${GLM45_AIR_TP_SIZE:-1}
      - --dtype
      - auto
      - --kv-cache-dtype
      - ${GLM45_AIR_KV_CACHE_DTYPE:-fp8}
      - --max-model-len
      - ${GLM45_AIR_MAX_MODEL_LEN:-16384}
      - --max-num-seqs
      - ${GLM45_AIR_MAX_NUM_SEQS:-1}
      - --max-num-batched-tokens
      - ${GLM45_AIR_MAX_BATCHED_TOKENS:-4096}
      - --kv-cache-memory-bytes
      - ${GLM45_AIR_KV_CACHE_MEMORY_BYTES:-6G}
      - --gpu-memory-utilization
      - ${GLM45_AIR_GPU_MEMORY_UTILIZATION:-0.7}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - ${GLM45_AIR_LOAD_FORMAT:-auto}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm45
      - --reasoning-parser
      - glm45
      - --speculative-config.method
      - mtp
      - --speculative-config.num_speculative_tokens
      - "1"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qwen:
    image: ${VLLM_IMAGE:-vllm/vllm-openai@sha256:d0f160a7391f574fdffdd0f8da13eea09c590b3b9651a2dba30b1d358ff942bb}
    container_name: vllm-qwen36-27b-nvfp4
    restart: unless-stopped
    profiles:
      - qwen
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${QWEN36_27B_MODELS_DIR:-/storage03/models/qwen36-27b}/qwen3.6-27b-nvfp4:/models/qwen3.6-27b-nvfp4
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
    command:
      - ${QWEN36_27B_MODEL_PATH:-/models/qwen3.6-27b-nvfp4}
      - --served-model-name
      - qwen3.6-27b
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --tensor-parallel-size
      - ${QWEN36_27B_TP_SIZE:-1}
      - --dtype
      - auto
      - --kv-cache-dtype
      - ${QWEN36_27B_KV_CACHE_DTYPE:-fp8}
      - --max-model-len
      - ${QWEN36_27B_MAX_MODEL_LEN:-262144}
      - --max-num-seqs
      - ${QWEN36_27B_MAX_NUM_SEQS:-32}
      - --max-num-batched-tokens
      - ${QWEN36_27B_MAX_BATCHED_TOKENS:-32768}
      - --gpu-memory-utilization
      - ${QWEN36_27B_GPU_MEMORY_UTILIZATION:-0.9}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - ${QWEN36_27B_LOAD_FORMAT:-auto}
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${QWEN36_27B_TOOL_CALL_PARSER:-qwen3_xml}
      - --reasoning-parser
      - qwen3
      - --speculative-config.method
      - mtp
      - --speculative-config.num_speculative_tokens
      - ${QWEN36_27B_SPECULATIVE_TOKENS:-3}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
