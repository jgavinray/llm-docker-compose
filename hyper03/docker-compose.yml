# Production single-model deployment for hyper03.
#
# Host:
#   NVIDIA RTX PRO 6000 Blackwell Workstation Edition, 96 GB VRAM
#
# Target:
#   Qwen3.5-122B-A10B via NVIDIA NVFP4 checkpoint and vLLM.
#
# Rationale:
#   - Official FP8 is too large for one 96 GB GPU once runtime/KV overhead is
#     included.
#   - GGUF can fit, but vLLM GGUF support is experimental and slower.
#   - NVIDIA's NVFP4 checkpoint is built for vLLM on Blackwell and is the best
#     fit here for high quality plus high decode throughput on one GPU.

services:
  qwen35-122b:
    image: ${VLLM_IMAGE:-nvcr.io/nvidia/vllm:26.04-py3}
    container_name: hyper03-vllm-qwen35-122b
    entrypoint:
      - vllm
      - serve
    ports:
      - "${QWEN35_122B_PORT:-8000}:8000"
    volumes:
      - ${HF_HOME:-/storage03/models/huggingface}:/models/huggingface
      - ${VLLM_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/vllm-cache}:/root/.cache/vllm
      - ${TIKTOKEN_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/tiktoken-cache}:/root/.cache/tiktoken_cache
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - HF_HOME=/models/huggingface
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    command:
      - ${QWEN35_122B_MODEL:-nvidia/Qwen3.5-122B-A10B-NVFP4}
      - --served-model-name
      - ${QWEN35_122B_MODEL_NAME:-qwen3.5-122b-a10b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --trust-remote-code
      - --quantization
      - ${QWEN35_122B_QUANTIZATION:-modelopt_fp4}
      - --kv-cache-dtype
      - ${QWEN35_122B_KV_CACHE_DTYPE:-fp8}
      - --tensor-parallel-size
      - ${QWEN35_122B_TP_SIZE:-1}
      - --max-model-len
      - ${QWEN35_122B_MAX_MODEL_LEN:-262144}
      - --max-num-seqs
      - ${QWEN35_122B_MAX_NUM_SEQS:-4}
      - --max-num-batched-tokens
      - ${QWEN35_122B_MAX_BATCHED_TOKENS:-8192}
      - --gpu-memory-utilization
      - ${QWEN35_122B_GPU_MEMORY_UTILIZATION:-0.92}
      - --enable-prefix-caching
      - --prefix-caching-hash-algo
      - sha256
      - --enable-chunked-prefill
      - --async-scheduling
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${QWEN35_122B_TOOL_CALL_PARSER:-qwen3_coder}
      - --reasoning-parser
      - qwen3
      - --language-model-only
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${CUDA_VISIBLE_DEVICES:-0}"]
              capabilities: [gpu]
    restart: unless-stopped
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 180
      start_period: 120s
    labels:
      lastloop.service.name: "hyper03-vllm-qwen35-122b"
      lastloop.service.port: "${QWEN35_122B_PORT:-8000}"
      lastloop.service.description: "Qwen3.5 122B-A10B NVFP4 via vLLM on one Blackwell GPU"
