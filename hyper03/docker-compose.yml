# Production dual-model deployment for hyper03.
#
# Host:
#   NVIDIA RTX PRO 6000 Blackwell Workstation Edition, 96 GB VRAM
#
# Target:
#   - Qwen3.6-27B INT4 AutoRound as the primary local model
#   - Qwen3-Next-80B-A3B-Thinking AWQ 4-bit as the deep reasoning model
#
# Default sizing:
#   - FP8 KV cache
#   - 262k context for both models
#   - 1 concurrent sequence per model
#   - GPU memory caps sum to 0.95, weighted toward the 80B reasoning model
#   - Sequential startup; vLLM memory profiling is not safe when both services
#     allocate/release GPU memory during warmup at the same time.

x-vllm-common: &vllm-common
  restart: unless-stopped
  ipc: host
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["${CUDA_VISIBLE_DEVICES:-0}"]
            capabilities: [gpu]

services:
  qwen36-27b:
    <<: *vllm-common
    depends_on:
      qwen3-next-80b-thinking:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyper03-vllm-qwen36-27b
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    ports:
      - "${QWEN36_PORT:-8000}:8000"
    volumes:
      - ${MODELS_ROOT:-/storage03/models}:/models:ro
      - ${VLLM_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/vllm-cache}/qwen36:/root/.cache/vllm
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
    command:
      - --model
      - ${QWEN36_MODEL_PATH:-/models/Qwen3.6-27B-int4-AutoRound}
      - --served-model-name
      - ${QWEN36_MODEL_NAME:-qwen3.6-27b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --trust-remote-code
      - --default-chat-template-kwargs
      - '{"enable_thinking":false}'
      - --quantization
      - auto_round
      - --kv-cache-dtype
      - ${QWEN36_KV_CACHE_DTYPE:-fp8}
      - --max-model-len
      - ${QWEN36_MAX_MODEL_LEN:-262144}
      - --gpu-memory-utilization
      - ${QWEN36_GPU_MEM_UTIL:-0.35}
      - --max-num-seqs
      - ${QWEN36_MAX_NUM_SEQS:-1}
      - --enable-prefix-caching
      - --enable-prompt-tokens-details
      - --enable-chunked-prefill
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --language-model-only
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 180
      start_period: 120s
    labels:
      lastloop.service.name: "hyper03-vllm-qwen36-27b"
      lastloop.service.port: "${QWEN36_PORT:-8000}"
      lastloop.service.description: "Qwen3.6 27B INT4 AutoRound via patched vLLM, 1x262k, FP8 KV"

  qwen3-next-80b-thinking:
    <<: *vllm-common
    image: ${VLLM_IMAGE:-nvcr.io/nvidia/vllm:26.04-py3}
    container_name: hyper03-vllm-qwen3-next-80b-thinking
    entrypoint:
      - vllm
      - serve
    ports:
      - "${QWEN3_NEXT_80B_PORT:-8001}:8000"
    volumes:
      - ${MODELS_ROOT:-/storage03/models}:/models:ro
      - ${VLLM_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/vllm-cache}/qwen3-next-80b:/root/.cache/vllm
      - ${TIKTOKEN_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/tiktoken-cache}:/root/.cache/tiktoken_cache
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    command:
      - ${QWEN3_NEXT_80B_MODEL_PATH:-/models/Qwen3-Next-80B-A3B-Thinking-AWQ-4bit}
      - --served-model-name
      - ${QWEN3_NEXT_80B_MODEL_NAME:-qwen3-next-80b-a3b-thinking}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --trust-remote-code
      - --kv-cache-dtype
      - ${QWEN3_NEXT_80B_KV_CACHE_DTYPE:-fp8}
      - --tensor-parallel-size
      - ${QWEN3_NEXT_80B_TP_SIZE:-1}
      - --max-model-len
      - ${QWEN3_NEXT_80B_MAX_MODEL_LEN:-262144}
      - --max-num-seqs
      - ${QWEN3_NEXT_80B_MAX_NUM_SEQS:-1}
      - --max-num-batched-tokens
      - ${QWEN3_NEXT_80B_MAX_BATCHED_TOKENS:-8192}
      - --gpu-memory-utilization
      - ${QWEN3_NEXT_80B_GPU_MEMORY_UTILIZATION:-0.60}
      - --enable-prefix-caching
      - --prefix-caching-hash-algo
      - sha256
      - --enable-chunked-prefill
      - --async-scheduling
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${QWEN3_NEXT_80B_TOOL_CALL_PARSER:-hermes}
      - --reasoning-parser
      - qwen3
      - --language-model-only
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 240
      start_period: 180s
    labels:
      lastloop.service.name: "hyper03-vllm-qwen3-next-80b-thinking"
      lastloop.service.port: "${QWEN3_NEXT_80B_PORT:-8001}"
      lastloop.service.description: "Qwen3-Next 80B-A3B Thinking AWQ 4-bit via vLLM, 1x262k, FP8 KV"
