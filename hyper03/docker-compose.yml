# GLM-4.5-Air 4-bit/NVFP4 on hyper03
#
# Default layout (override with GLM45_AIR_MODELS_DIR=/your/path docker compose up -d):
#   /storage03/models/glm45-air/glm-4.5-air-nvfp4/    <- Firworks/GLM-4.5-Air-nvfp4
#   /storage03/huggingface/                            <- Hugging Face cache
#
# Upstream serving notes:
#   - vLLM >= 0.11.0 is required for GLM-4.5-Air support.
#   - hyper03 targets one NVIDIA RTX PRO 6000 Blackwell card with 96 GB GDDR7.
#   - RTX PRO 6000 Blackwell has 5th-gen Tensor Cores with FP4 support. NVFP4 is
#     selected to fit GLM-4.5-Air into this single-card memory envelope while
#     aligning with the card's native low-precision inference path.
#   - The upstream publisher for GLM-4.5-Air is Z.ai / zai-org. Firworks is used
#     here only as a third-party NVFP4 quantization because an official zai-org
#     NVFP4 checkpoint was not available when this compose file was created.
#   - The BF16 and FP8 GLM-4.5-Air checkpoints are too large for comfortable
#     single-card serving here, so this host defaults to NVFP4 rather than BF16/FP8.
#   - To use an AWQ/GPTQ 4-bit checkpoint instead, set GLM45_AIR_MODEL_PATH to
#     that mounted path or Hugging Face model ID and adjust GLM45_AIR_LOAD_FORMAT
#     only if the checkpoint requires it.

services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly}
    container_name: vllm-glm45-air-nvfp4
    restart: unless-stopped
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${GLM45_AIR_MODELS_DIR:-/storage03/models/glm45-air}/glm-4.5-air-nvfp4:/models/glm-4.5-air-nvfp4
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
    command:
      - bash
      - -c
      - |
        exec vllm serve ${GLM45_AIR_MODEL_PATH:-/models/glm-4.5-air-nvfp4} \
          --served-model-name glm-4.5-air \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size ${GLM45_AIR_TP_SIZE:-1} \
          --dtype auto \
          --max-model-len ${GLM45_AIR_MAX_MODEL_LEN:-32768} \
          --max-num-seqs ${GLM45_AIR_MAX_NUM_SEQS:-16} \
          --max-num-batched-tokens ${GLM45_AIR_MAX_BATCHED_TOKENS:-16384} \
          --gpu-memory-utilization ${GLM45_AIR_GPU_MEMORY_UTILIZATION:-0.9} \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --load-format ${GLM45_AIR_LOAD_FORMAT:-auto} \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser glm45 \
          --reasoning-parser glm45 \
          --speculative-config.method mtp \
          --speculative-config.num_speculative_tokens 1
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
