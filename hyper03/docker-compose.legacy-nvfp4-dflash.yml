# Gemma 4 31B NVFP4 and Qwen3.6-27B NVFP4 on hyper03
#
# Default layout (override with GLM45_AIR_MODELS_DIR=/your/path docker compose up -d):
#   /storage03/models/gemma4-31b/Gemma-4-31B-IT-NVFP4/
#   /storage03/models/qwen36-27b/qwen3.6-27b-nvfp4/   <- optional local unsloth/Qwen3.6-27B-NVFP4 mirror
#   /storage03/models/qwen36-27b/qwen36-27b-dflash/    <- optional z-lab/Qwen3.6-27B-DFlash drafter
#   /storage03/huggingface/                            <- Hugging Face cache
#
# Upstream serving notes:
#   - The default image below tracks the vLLM Gemma4 CUDA 13.0 image for
#     Blackwell.
#   - hyper03 targets one NVIDIA RTX PRO 6000 Blackwell card with 96 GB GDDR7.
#   - RTX PRO 6000 Blackwell has 5th-gen Tensor Cores with FP4 support. NVFP4 is
#     selected for Gemma 4 31B to use the native low-precision path and fit
#     alongside the Qwen service.
#   - Gemma is capped at 65K context and three active sequences by default. The
#     default GPU memory target is intentionally below the whole-card setting but
#     still high enough to load the NVFP4 checkpoint plus a useful KV cache.
#   - Qwen3.6-27B supports a native 262K context window, but the default here is
#     capped at 65K and six active sequences so agent traffic can run
#     concurrently while Gemma remains resident on the same 96 GB card.
#
# Tuning notes from local RTX PRO 6000 Blackwell validation:
#   - Requirement: keep both Gemma 4 31B and Qwen3.6 27B resident together,
#     preserve 65,536-token context, and allow six active Qwen streams.
#   - NVFP4 KV cache was not usable with the tested vLLM/GPU path:
#       * Qwen rejected nvfp4 KV because the runtime required sm100f.
#       * Gemma's attention path rejected the nvfp4 KV cache dtype.
#     FP8 KV cache is the working default for both services.
#   - Gemma single-stream baseline:
#       * gpu-memory-utilization=0.50, max-num-seqs=1,
#         max-num-batched-tokens=4096, kv-cache-dtype=fp8.
#       * Startup reported about 29.9 GiB model memory, 18.9 GiB available KV,
#         277,698 KV tokens, and 4.24x concurrency at 65,536 tokens/request.
#       * Strict one-request long-generation test produced 9,131 completion
#         tokens in 254.04s: 35.9 API completion tokens/sec. vLLM steady decode
#         was about 37 tokens/sec.
#   - Current Gemma safe resident profile:
#       * gpu-memory-utilization=0.50, max-num-seqs=3,
#         max-num-batched-tokens=4096, kv-cache-dtype=fp8.
#       * Startup reported about 29.9 GiB model memory, 14.6 GiB available KV,
#         214,512 KV tokens, and 3.27x concurrency at 65,536 tokens/request.
#       * Strict three-concurrent long-generation test passed 3/3 outputs over
#         5,000 words. Word counts were 7,649, 5,920, and 6,250.
#       * API wall-clock throughput was 25,431 completion tokens in 293.71s:
#         86.6 completion tokens/sec and 88.7 total tokens/sec.
#       * During the saturated part of the run, vLLM reported roughly 98-101
#         generation tokens/sec, or about 33 tokens/sec/stream.
#   - Gemma throughput profile for non-full-context traffic:
#       * max-num-seqs=4 with the same memory and batch settings starts
#         successfully, but only reports 3.27x full-context concurrency at
#         65,536 tokens/request. Treat it as a throughput mode, not a guarantee
#         for four simultaneous max-context Gemma requests.
#       * Strict four-concurrent long-generation test passed 4/4 outputs over
#         5,000 words. Word counts were 6,563, 7,552, 7,751, and 6,374.
#       * API wall-clock throughput was 35,847 completion tokens in 284.54s:
#         126.0 completion tokens/sec and 128.9 total tokens/sec.
#       * During the saturated part of the run, vLLM reported roughly 138-149
#         generation tokens/sec, or about 35 tokens/sec/stream.
#   - Gemma MTP assistant attempt:
#       * The nightly vLLM image contains Gemma4MTPModel support and resolves the
#         local gemma-4-31B-it-assistant checkpoint as Gemma4MTPModel when served
#         with speculative_config.method=mtp.
#       * Startup failed while loading the 0.87 GiB assistant checkpoint with an
#         AssertionError in gemma4_mtp.py during merged column weight loading:
#         param_data.shape != loaded_weight.shape.
#       * Gemma MTP is therefore not enabled in this compose file until the
#         assistant checkpoint/runtime pair is corrected.
#   - Qwen non-MTP baseline with max-num-seqs=6 and batch=4096:
#       * Startup reported about 23.05 GiB model memory, 17.4 GiB available KV,
#         495,616 KV tokens, and 7.56x concurrency at 65,536 tokens/request.
#       * Six concurrent long-generation test measured about 210.8 API
#         completion tokens/sec.
#   - Qwen MTP with max-num-seqs=6, speculative tokens=3, batch=4096:
#       * MTP added roughly 0.8 GiB model/drafter memory.
#       * Startup reported about 23.84 GiB model memory, 16.68 GiB available KV,
#         375,661 KV tokens, and 5.73x concurrency at 65,536 tokens/request.
#       * Six concurrent long-generation test measured 231.5 API completion
#         tokens/sec, with live saturated vLLM generation roughly 285-334
#         tokens/sec. Only 3/6 generated stories exceeded the 5,000-word test
#         requirement, so that run failed the workload requirement.
#   - Current Qwen MTP setting with batch=6144:
#       * Startup reported about 23.84 GiB model memory, 16.57 GiB available KV,
#         373,321 KV tokens, and 5.70x concurrency at 65,536 tokens/request.
#       * Strict six-concurrent test asked for six different dog-in-space stories
#         including Elon Musk, each requiring at least 5,000 words.
#       * Result: 6/6 passed the 5,000-word floor. Word counts were 5,232,
#         6,278, 6,214, 5,636, 6,572, and 9,031.
#       * API wall-clock throughput was 51,379 completion tokens in 235.77s:
#         217.9 completion tokens/sec and 223.0 total tokens/sec.
#       * During the fully saturated part of the run, vLLM reported roughly
#         300-330 generation tokens/sec. The final API average was lower because
#         shorter requests finished first and one long request dominated the
#         tail. With queued backfill, expected practical throughput is closer to
#         the saturated 300 tokens/sec band, or about 50-60 tokens/sec/stream
#         across six active Qwen streams.
#   - Remaining knobs worth testing, if more throughput is needed:
#       * QWEN36_27B_SPECULATIVE_TOKENS=4.
#       * QWEN36_27B_MAX_BATCHED_TOKENS=8192.
#       * Run a warmup pass before timing to avoid first-shape Triton JIT noise.

services:
  gemma:
    image: ${GEMMA4_VLLM_IMAGE:-vllm/vllm-openai:gemma4-0505-cu130}
    container_name: vllm-gemma4-31b-nvfp4
    restart: unless-stopped
    profiles:
      - gemma
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - VLLM_FLASHINFER_MOE_BACKEND=throughput
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${GEMMA4_31B_MODELS_DIR:-/storage03/models/gemma4-31b}/Gemma-4-31B-IT-NVFP4:/models/gemma-4-31b-nvfp4
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
    command:
      - ${GEMMA4_31B_MODEL_PATH:-/models/gemma-4-31b-nvfp4}
      - --served-model-name
      - gemma-4-31b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${GEMMA4_31B_TP_SIZE:-1}
      - --dtype
      - auto
      - --kv-cache-dtype
      - ${GEMMA4_31B_KV_CACHE_DTYPE:-fp8}
      - --max-model-len
      - ${GEMMA4_31B_MAX_MODEL_LEN:-65536}
      - --max-num-seqs
      - ${GEMMA4_31B_MAX_NUM_SEQS:-3}
      - --max-num-batched-tokens
      - ${GEMMA4_31B_MAX_BATCHED_TOKENS:-4096}
      - --gpu-memory-utilization
      - ${GEMMA4_31B_GPU_MEMORY_UTILIZATION:-0.50}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - ${GEMMA4_31B_LOAD_FORMAT:-auto}
      - --trust-remote-code
      - --async-scheduling
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --limit-mm-per-prompt
      - '{"image":0,"video":0,"audio":0}'
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qwen:
    image: ${VLLM_IMAGE:-vllm-rtx6000-qwen36-27b:nvfp4-sm120-xqa}
    container_name: vllm-qwen36-27b-nvfp4
    restart: unless-stopped
    profiles:
      - qwen
    entrypoint:
      - vllm
      - serve
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_MOE_FP4=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    volumes:
      - ${QWEN36_27B_MODELS_DIR:-/storage03/models/qwen36-27b}/qwen3.6-27b-nvfp4:/models/qwen3.6-27b-nvfp4
      - ${QWEN36_27B_DFLASH_DIR:-/storage03/models/qwen36-27b/qwen36-27b-dflash}:/models/qwen36-27b-dflash
      - ${HF_HOME:-/storage03/huggingface}:/root/.cache/huggingface
      - ${VLLM_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/vllm-cache}:/root/.cache/vllm
      - ${FLASHINFER_CACHE_DIR:-/storage03/vllm-docker-compose/hyper03/flashinfer-cache}:/root/.cache/flashinfer
    command:
      - ${QWEN36_27B_MODEL_PATH:-/models/qwen3.6-27b-nvfp4}
      - --served-model-name
      - qwen3.6-27b
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --tensor-parallel-size
      - ${QWEN36_27B_TP_SIZE:-1}
      - --dtype
      - auto
      - --kv-cache-dtype
      - ${QWEN36_27B_KV_CACHE_DTYPE:-nvfp4}
      - --max-model-len
      - ${QWEN36_27B_MAX_MODEL_LEN:-262144}
      - --max-num-seqs
      - ${QWEN36_27B_MAX_NUM_SEQS:-2}
      - --max-num-batched-tokens
      - ${QWEN36_27B_MAX_BATCHED_TOKENS:-32768}
      - --gpu-memory-utilization
      - ${QWEN36_27B_GPU_MEMORY_UTILIZATION:-0.90}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --load-format
      - ${QWEN36_27B_LOAD_FORMAT:-safetensors}
      - --trust-remote-code
      - --language-model-only
      - --async-scheduling
      - --enforce-eager
      - --enable-auto-tool-choice
      - --tool-call-parser
      - ${QWEN36_27B_TOOL_CALL_PARSER:-qwen3_xml}
      - --reasoning-parser
      - qwen3
      - --default-chat-template-kwargs
      - '{"enable_thinking":false}'
      - --speculative-config
      - '{"method":"dflash","model":"/models/qwen36-27b-dflash","num_speculative_tokens":15,"attention_backend":"FLASH_ATTN"}'
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
